<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="720" height="380" rx="12" fill="#0d1117"/>
  <text x="360" y="32" fill="#e7edf3" font-size="18" font-weight="700" text-anchor="middle">Flag exfiltré vs blocage fournisseur — 18 runs</text>
  <text x="360" y="52" fill="#9aa6b2" font-size="12" text-anchor="middle">3 conditions × 3 runs · cible cartavault.com</text>

  <!-- axes -->
  <line x1="80" y1="80" x2="80" y2="310" stroke="#2a313c"/>
  <line x1="80" y1="310" x2="690" y2="310" stroke="#2a313c"/>
  <!-- gridlines + y labels -->
  <line x1="80" y1="80"  x2="690" y2="80"  stroke="#2a313c" stroke-dasharray="3 3"/>
  <line x1="80" y1="137" x2="690" y2="137" stroke="#20262f" stroke-dasharray="3 3"/>
  <line x1="80" y1="195" x2="690" y2="195" stroke="#2a313c" stroke-dasharray="3 3"/>
  <line x1="80" y1="252" x2="690" y2="252" stroke="#20262f" stroke-dasharray="3 3"/>
  <text x="70" y="84"  fill="#9aa6b2" font-size="12" text-anchor="end">100</text>
  <text x="70" y="141" fill="#9aa6b2" font-size="12" text-anchor="end">75</text>
  <text x="70" y="199" fill="#9aa6b2" font-size="12" text-anchor="end">50</text>
  <text x="70" y="256" fill="#9aa6b2" font-size="12" text-anchor="end">25</text>
  <text x="70" y="314" fill="#9aa6b2" font-size="12" text-anchor="end">0</text>
  <text x="26" y="200" fill="#9aa6b2" font-size="12" text-anchor="middle" transform="rotate(-90 26,200)">% des runs</text>

  <!-- OFF -->
  <rect x="145" y="80"  width="50" height="230" rx="3" fill="#3fb950"/>
  <text x="170" y="72" fill="#3fb950" font-size="13" font-weight="700" text-anchor="middle">100</text>
  <rect x="205" y="308" width="50" height="2"   rx="1" fill="#f85149"/>
  <text x="230" y="303" fill="#9aa6b2" font-size="13" text-anchor="middle">0</text>
  <text x="200" y="332" fill="#e7edf3" font-size="14" font-weight="700" text-anchor="middle">off</text>
  <text x="200" y="350" fill="#9aa6b2" font-size="11" text-anchor="middle">0 payload</text>

  <!-- V1 -->
  <rect x="325" y="80"  width="50" height="230" rx="3" fill="#3fb950"/>
  <text x="350" y="72" fill="#3fb950" font-size="13" font-weight="700" text-anchor="middle">100</text>
  <rect x="385" y="156" width="50" height="154" rx="3" fill="#f85149"/>
  <text x="410" y="150" fill="#f85149" font-size="13" font-weight="700" text-anchor="middle">67</text>
  <text x="380" y="332" fill="#e7edf3" font-size="14" font-weight="700" text-anchor="middle">v1</text>
  <text x="380" y="350" fill="#9aa6b2" font-size="11" text-anchor="middle">méta / adressé à l'IA</text>

  <!-- V2 -->
  <rect x="505" y="80"  width="50" height="230" rx="3" fill="#3fb950"/>
  <text x="530" y="72" fill="#3fb950" font-size="13" font-weight="700" text-anchor="middle">100</text>
  <rect x="565" y="234" width="50" height="76"  rx="3" fill="#f85149"/>
  <text x="590" y="228" fill="#f85149" font-size="13" font-weight="700" text-anchor="middle">33</text>
  <text x="560" y="332" fill="#e7edf3" font-size="14" font-weight="700" text-anchor="middle">v2</text>
  <text x="560" y="350" fill="#9aa6b2" font-size="11" text-anchor="middle">cohérent / CGU · RGPD</text>

  <!-- legend -->
  <rect x="470" y="365" width="12" height="12" rx="2" fill="#3fb950"/>
  <text x="488" y="375" fill="#9aa6b2" font-size="12">flag exfiltré</text>
  <rect x="588" y="365" width="12" height="12" rx="2" fill="#f85149"/>
  <text x="606" y="375" fill="#9aa6b2" font-size="12">bloqué (Anthropic)</text>
</svg>
